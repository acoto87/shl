name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build nob
        run: cc -std=c99 -Wall -Wextra nob.c -o nob

      - name: Run Unity test suite
        run: ./nob test

      - name: Run AddressSanitizer test suite
        run: ./nob asan

      - name: Run Valgrind leak checks
        run: ./nob valgrind
